name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build EXE
        run: pyinstaller --onefile --name discord_sender discord_sender.py

      - name: Run EXE
        run: dist\discord_sender.exe

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: discord-sender-exe
          path: dist/discord_sender.exe
